<p-select
    [options]="debitaveis"
    [(ngModel)]="value"
    (ngModelChange)="onChangeValue($event)"
    (blur)="onBlur()"
    [placeholder]="placeholder"
    [disabled]="disabled"
    optionLabel="descricao"
    dataKey="id"
    appendTo="body"
    (onChange)="emitChange()"
    class="w-full"
    showClear="true"
    [optionDisabled]="'isOptionDisabled'">
    <ng-template #selectedItem let-debitavel>
        <app-color-display [color]="debitavel.cor" [text]="debitavel.descricao" [class.texto-vermelho]="!debitavel.ativo" />
    </ng-template>

    <ng-template let-debitavel #item>
        <app-color-display [color]="debitavel.cor" [text]="debitavel.descricao" [class.texto-vermelho]="!debitavel.ativo" />
    </ng-template>
</p-select>
