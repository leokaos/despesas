<span class="page-title">
    <i class="pi pi-chevron-right"></i> Edicão em Lote de Receita
</span>

@if (loading()) {
<app-loader />
} @else {
<div class="form-panel">

    <div class="flex gap-4 my-8">
        <div class="flex-1">
            <div class="flex gap-2">
                <input pInputText
                    [(ngModel)]="queryText"
                    placeholder="Digite sua busca ex: descricao=='*agua*';vencimento=gt='2026-01-01'"
                    class="w-full"
                    (keydown.control.enter)="search()" />
                <p-button label="Buscar" icon="pi pi-search" severity="primary" (click)="search()" [loading]="searching()" />
                <p-button label="Limpar" icon="pi pi-times" severity="secondary" (click)="clear()" />
            </div>
        </div>
    </div>

    <div class="my-8">
        <p-table [value]="receitas" [loading]="searching()">
            <ng-template #header>
                <tr>
                    <th class="w-120"> Descrição </th>
                    <th class="w-10"> Valor </th>
                    <th class="w-60"> Vencimento 
                         <p-datepicker [showIcon]="true" oncsee appendTo="body" (onSelect)="setVencimento($event)" [(ngModel)]="vencimento" />
                    </th>
                    <th class="w-80"> Tipo
                        <app-select-tipo-movimentacao [tipos]="tipos" (onSelect)="setTiporeceita($event)" [(ngModel)]="tipoReceita"/>
                    </th>
                    <th class="w-80"> Debitável
                        <app-select-debitavel [debitaveis]="debitaveis" (onSelect)="setDebitavel($event)" [(ngModel)]="debitavel"/>
                    </th>
                    <th class="small-column"> Depositada? </th>
                </tr>
            </ng-template>
            <ng-template #body let-receita let-i="rowIndex">
                <tr>
                    <td>
                        <input pInputText [(ngModel)]="receita.descricao" class="w-full" />
                    </td>
                    <td>
                        <p-inputnumber [(ngModel)]="receita.valor" locale="pt-BR" [minFractionDigits]="2" [maxFractionDigits]="2" />
                    </td>
                    <td>
                        <p-datepicker [showIcon]="true" [(ngModel)]="receita.vencimento" appendTo="body" />
                    </td>
                    <td>
                        <app-select-tipo-movimentacao [tipos]="tipos" [(ngModel)]="receita.tipo" />
                    </td>
                    <td>
                        <app-select-debitavel [(ngModel)]="receita.debitavel" [debitaveis]="debitaveis" (onSelect)="setMoeda(receita)" />
                    </td>
                    <td class="small-column">
                        <p-checkbox [binary]="true" [(ngModel)]="receita.depositado" size="large" />
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <div class="flex w-full">
        <div class="flex flex-1 justify-end">
            <p-button icon="pi pi-check" label="Salvar" severity="secondary" size="small" (click)="visibleSave.set(true)" [disabled]="receitas.length <= 0" />
        </div>
    </div>

</div>

<p-dialog header="Salvar" [style]="{ width: '500px' }" [modal]="true" position="top" [(visible)]="visibleSave">

    <div class="flex flex-col gap-4">
        <div class="flex flex-1 items-center mb-10">
            <label class="w-40">Iniciar?</label>
            <app-progress-bar
                              [animated]="false"
                              [total]="total()"
                              [current]="parcial()"
                              class="w-full"
                              [showLabel]="true"
                              [showState]="false"
                              [currency]="false" />
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex flex-1 gap-2">
            <p-button label="Cancelar" icon="pi pi-times" (click)="visibleSave.set(false)" severity="secondary" class="flex flex-1 justify-start" />
            <p-button label="OK" icon="pi pi-check" class="flex flex-1 justify-end" (click)="salvar()" />
        </div>
    </ng-template>
</p-dialog>

}
