<span class="page-title">
    <i class="pi pi-chevron-right"></i> Edicão em Lote de Despesa
</span>

@if (loading()) {
<app-loader />
} @else {
<div class="form-panel">

    <app-panel-filtro type="despesa" (onSearch)="search($event)"/>

    <div class="my-8">
        <p-table [value]="despesas()" [loading]="searching()">
            <ng-template #header>
                <tr>
                    <th class="w-120"> Descrição </th>
                    <th class="w-10"> Valor </th>
                    <th class="w-60"> Vencimento
                        <p-datepicker [showIcon]="true" oncsee appendTo="body" (onSelect)="setVencimento($event)" [(ngModel)]="vencimento" />
                    </th>
                    <th class="w-80"> Tipo
                        <app-select-tipo-movimentacao [tipos]="tipos" (onSelect)="setTipoDespesa($event)" [(ngModel)]="tipoDespesa" />
                    </th>
                    <th class="w-80"> Debitável
                        <app-select-debitavel [debitaveis]="debitaveis" (onSelect)="setDebitavel($event)" [(ngModel)]="debitavel" />
                    </th>
                    <th class="small-column"> Paga? </th>
                    <th class="small-column"> Ações</th>
                </tr>
            </ng-template>
            <ng-template #body let-despesa let-i="rowIndex">
                <tr>
                    <td>
                        <input pInputText [(ngModel)]="despesa.descricao" class="w-full" />
                    </td>
                    <td>
                        <p-inputnumber [(ngModel)]="despesa.valor" locale="pt-BR" [minFractionDigits]="2" [maxFractionDigits]="2" />
                    </td>
                    <td>
                        <p-datepicker [showIcon]="true" [(ngModel)]="despesa.vencimento" appendTo="body" />
                    </td>
                    <td>
                        <app-select-tipo-movimentacao [tipos]="tipos" [(ngModel)]="despesa.tipo" />
                    </td>
                    <td>
                        <app-select-debitavel [(ngModel)]="despesa.debitavel" [debitaveis]="debitaveis" (onSelect)="setMoeda(despesa)" />
                    </td>
                    <td class="small-column">
                        <p-checkbox [binary]="true" [(ngModel)]="despesa.paga" size="large" />
                    </td>
                    <td class="small-column">
                        <p-button icon="pi pi-times" severity="danger" (click)="remove(despesa)" size="small" />
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <div class="flex w-full">
        <div class="flex flex-1 justify-end">
            <p-button icon="pi pi-check" label="Salvar" severity="secondary" size="small" (click)="visibleSave.set(true)" [disabled]="despesas().length <= 0" />
        </div>
    </div>

</div>

<app-save-dialog
    [(visible)]="visibleSave"
    [items]="despesas()"
    [saveFn]="saveDespesa.bind(this)"
    successMessage="Despesas salvas com sucesso!"
    (saved)="clear()">
</app-save-dialog>

}
